name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sorry-gate
        run: bash scripts/no_sorry.sh

      - name: Build (lean-action fetches the Mathlib cache, then `lake build`)
        uses: leanprover/lean-action@v1
